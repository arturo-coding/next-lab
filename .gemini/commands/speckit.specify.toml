description = "Create or update the feature specification from a natural language feature description."

[handoffs]
"Build Technical Plan" = { agent = "speckit.plan", prompt = "Create a plan for the spec. I am building with..." }
"Clarify Spec Requirements" = { agent = "speckit.clarify", prompt = "Clarify specification requirements", send = true }

[outline]
step1 = "Generate a concise short name (2-4 words) for the branch."
step2 = "Create the feature branch by running the script with --short-name (and --json)."
step3 = "Load .specify/templates/spec-template.md to understand required sections."
step4 = "Fill User Scenarios & Testing section, Functional Requirements, Success Criteria."
step5 = "Write the specification to SPEC_FILE using the template structure."
step6 = "Specification Quality Validation: Create and run Spec Quality Checklist."
step7 = "Report completion with branch name, spec file path, and checklist results."
