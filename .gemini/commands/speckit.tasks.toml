description = "Generate an actionable, dependency-ordered tasks.md for the feature based on available design artifacts."

[handoffs]
"Analyze For Consistency" = { agent = "speckit.analyze", prompt = "Run a project analysis for consistency", send = true }
"Implement Project" = { agent = "speckit.implement", prompt = "Start the implementation in phases", send = true }

[outline]
step1 = "Setup: Run `.specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks` from repo root and parse FEATURE_DIR and AVAILABLE_DOCS list."
step2 = "Load design documents: Read from FEATURE_DIR (plan.md, spec.md, data-model.md, etc.)."
step3 = "Execute task generation workflow: Generate tasks organized by user story."
step4 = "Generate tasks.md: Use `.specify/templates/tasks-template.md` as structure."
step5 = "Report: Output path to generated tasks.md and summary."
