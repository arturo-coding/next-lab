description = "Execute the implementation planning workflow using the plan template to generate design artifacts."

[handoffs]
"Create Tasks" = { agent = "speckit.tasks", prompt = "Break the plan into tasks", send = true }
"Create Checklist" = { agent = "speckit.checklist", prompt = "Create a checklist for the following domain...", send = true }

[outline]
step1 = "Setup: Run `.specify/scripts/bash/setup-plan.sh --json` from repo root and parse JSON for FEATURE_SPEC, IMPL_PLAN, SPECS_DIR, BRANCH."
step2 = "Load context: Read FEATURE_SPEC and `.specify/memory/constitution.md`. Load IMPL_PLAN template (already copied)."
step3 = "Execute plan workflow: Follow the structure in IMPL_PLAN template."
step4 = "Stop and report: Command ends after Phase 2 planning. Report branch, IMPL_PLAN path, and generated artifacts."
